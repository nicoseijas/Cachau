name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .[dev]
      - name: Install the data stack
        # Optional at runtime — the suite importorskips all three — but the
        # NumPy/pandas identity tests and the whole Numba matrix only run when
        # they are present, so a green build without them proves much less.
        # Not fatal: Numba routinely lags a new CPython by months, and losing
        # that matrix should degrade coverage, not block the build.
        continue-on-error: true
        run: pip install numpy pandas numba
      - name: Tests
        run: pytest -q

  free-threaded:
    name: free-threaded (py${{ matrix.python-version }}, GIL off)
    # The reason this job exists: the stats tallies (#15) are only genuinely
    # racy without the GIL. On a GIL build the specialized LOAD_ATTR/STORE_ATTR
    # path contains no thread-switch point, so `+=` is atomic in practice and
    # the concurrency tests CANNOT fail there — 16 threads x 20,000 increments
    # at switchinterval=1e-7 lost exactly zero. Here they can.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13t", "3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Confirm the GIL is really off
        # Without this the job can silently fall back to a GIL build and go
        # green while proving nothing at all.
        run: |
          python -c "import sys; assert not sys._is_gil_enabled(), 'GIL is ENABLED'; print(sys.version)"
      - name: Install
        # No numpy/pandas/numba here: they have no dependable free-threaded
        # wheels yet, and the suite importorskips them. The core suite is what
        # this job is for.
        run: pip install -e .[dev]
      - name: Tests
        run: pytest -q
      - name: Hammer the concurrency tests
        # A single pass proves little about a race. Repeat so that losing the
        # tallies lock fails loudly instead of flaking once a month.
        run: |
          for i in $(seq 1 25); do
            pytest tests/test_stats.py -q -k "concurren or consistent" || exit 1
          done

  examples:
    name: examples run end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e .[dev] numpy pandas numba
      - name: Run examples
        run: |
          python examples/01_quickstart.py
          python examples/02_data_workflows.py
          python examples/03_observability.py
          python examples/04_numba_workloads.py

  package:
    name: package builds and installs clean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build
        run: |
          pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Install the wheel into a clean environment and smoke-test it
        # v0.3.0 was published after exactly this check caught nothing — but
        # it is the check that would catch a wheel missing a module.
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install -q dist/*.whl
          /tmp/verify/bin/python -c "
          import pathlib
          import cachau
          @cachau.cache
          def f(x):
              return x * 2
          assert f(3) == 6 and f(3) == 6
          assert f.cache.stats().hits == 1
          # PEP 561: without this marker every downstream type checker treats
          # the package as untyped and silently infers Any, no matter how
          # completely it is annotated. It has to be checked on the INSTALLED
          # package — a source-tree check would miss a packaging regression.
          assert (pathlib.Path(cachau.__file__).parent / 'py.typed').is_file(), 'py.typed missing from the wheel'
          print('smoke OK', cachau.__version__)
          "
      - name: Type checkers see the annotations
        run: |
          /tmp/verify/bin/pip install -q mypy
          cat > /tmp/typed_check.py <<'PY'
          from cachau import cache

          @cache(ttl="1h")
          def f(x: int) -> int:
              return x * 2

          reveal_type(f)
          PY
          /tmp/verify/bin/python -m mypy /tmp/typed_check.py | tee /tmp/mypy.out
          grep -q 'Revealed type is "def (x: int) -> int"' /tmp/mypy.out
